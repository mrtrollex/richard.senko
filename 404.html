<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Page not found | Richard Šenko</title>
  <style>
    :root { color-scheme: light; font-family: Karla, Arial, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f8f7f3; color: #1e1810; }
    main { width: min(90%, 720px); padding: 64px 24px; text-align: center; }
    .code { margin: 0; color: #ffb100; font: 700 clamp(5rem, 20vw, 10rem)/0.9 Rubik, Arial, sans-serif; }
    h1 { margin: 24px 0 12px; font: 700 clamp(2rem, 6vw, 3.5rem)/1.2 Rubik, Arial, sans-serif; }
    p { margin: 0 auto 32px; max-width: 520px; color: #62615c; font-size: 1.1rem; line-height: 1.6; }
    a { display: inline-block; padding: 16px 22px; border-radius: 4px; background: #1e1810; color: #fff; font-weight: 700; text-decoration: none; }
    a:hover, a:focus-visible { background: #ffb100; color: #1e1810; }
  </style>
</head>
<body>
  <main>
    <p class="code" aria-hidden="true">404</p>
    <h1>Page not found</h1>
    <p>The page may have moved or no longer exists. You can return to the homepage and continue from there.</p>
    <a href="/">Back to homepage</a>
  </main>
</body>
</html>
